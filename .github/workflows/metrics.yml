name: Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**.svg"
      - "profile-3d-contrib/**"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Falls back to the built-in token (public-only) until METRICS_TOKEN
          # (a PAT with repo + read:org) is added — then private data is included.
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: github-metrics.svg
          user: saivarmadpr
          template: classic
          base: header, activity, community, repositories
          config_timezone: America/New_York
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full_year
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_charts: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
