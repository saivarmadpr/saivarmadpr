      @keyframes ghost { 0%,45% { opacity: 0 } 47% { opacity: .55 } 49% { opacity: 0 } 51% { opacity: .5 } 53%,100% { opacity: 0 } }
      @keyframes pulse { 0%,100% { opacity: .12 } 50% { opacity: .24 } }
      .mono { font-family: 'JetBrains Mono','SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace; }
      .cur { animation: blink 1s steps(1) infinite; }
      .l1 { animation: ln 7s ease-in-out infinite; }
      .l2 { animation: ln 7s ease-in-out infinite; animation-delay: .6s; }
      .l3 { animation: ln 7s ease-in-out infinite; animation-delay: 1.2s; }
      .gc { animation: ghost 4s steps(1) infinite; }
      .gm { animation: ghost 4s steps(1) infinite; animation-delay: .16s; }
      .scope { animation: pulse 3s ease-in-out infinite; }
    </style>
